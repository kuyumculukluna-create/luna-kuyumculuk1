<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna Kuyumculuk PRO</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.container{padding:20px}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
button{padding:10px;border:none;border-radius:8px;background:black;color:white;cursor:pointer}
select,input{padding:8px;width:100%;margin-top:5px}
</style>

</head>
<body>

<div class="container">

<h2>Ana Ekran</h2>

<div class="grid">
<div class="card">Nakit Kasa<br><b>₺0,00</b></div>
<div class="card">Banka<br><b>₺0,00</b></div>
<div class="card">Has Stok<br><b>0.000 g</b></div>
</div>

<div class="card">
<h3>Alış - Satış</h3>

<select id="islemTipi" onchange="tipDegis()">
<option>Satış</option>
<option>Alış</option>
</select>

<select id="urunTipi" onchange="tipDegis()">
<option>Ziynet</option>
<option>Gram Altın</option>
<option>Döviz</option>
</select>

<div id="dovizAlan" style="display:none">
<label>Döviz Türü</label>
<select>
<option>Dolar</option>
<option>Euro</option>
<option>Sterlin</option>
</select>
</div>

<label>Miktar</label>
<input type="number">

<label>Birim Fiyat</label>
<input type="number">

<button>İşlemi Kaydet</button>

</div>

</div>

<script>
function tipDegis(){
let urun=document.getElementById("urunTipi").value;
document.getElementById("dovizAlan").style.display = urun=="Döviz" ? "block":"none";
}
</script>

</body>
</html>
