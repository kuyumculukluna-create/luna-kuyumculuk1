<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNA GOLD - Pusula Yönetim Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .gold-gradient { background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%); }
        .sidebar-dark { background-color: #0f172a; }
    </pre>
</head>
<body>

<div class="flex min-h-screen">
    <!-- Sidebar -->
    <div class="w-64 sidebar-dark text-white p-6 hidden md:block">
        <div class="text-center py-8 border-b border-slate-800 mb-8">
            <h1 class="text-3xl font-black text-yellow-500 tracking-tighter">LUNA GOLD</h1>
            <p class="text-[10px] tracking-[0.3em] text-slate-400 uppercase mt-2">Pusula Sistemi</p>
        </div>
        <nav class="space-y-4">
            <a href="#" class="flex items-center space-x-3 p-4 bg-yellow-600 rounded-2xl text-white font-bold shadow-lg shadow-yellow-600/20">
                <i class="fas fa-chart-line w-5"></i> <span>Dashboard</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-4 hover:bg-slate-800 rounded-2xl text-slate-400 transition">
                <i class="fas fa-gem w-5"></i> <span>Stok Takibi</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-4 hover:bg-slate-800 rounded-2xl text-slate-400 transition">
                <i class="fas fa-users w-5"></i> <span>Cari Defter</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-4 hover:bg-slate-800 rounded-2xl text-slate-400 transition">
                <i class="fas fa-wallet w-5"></i> <span>Kasa & Rapor</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-y-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">Hoş geldin, Luna</h2>
                <p class="text-slate-500">Mağazanın bugünkü genel durumu.</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center">
                <div class="w-12 h-12 bg-yellow-50 rounded-xl flex items-center justify-center text-yellow-600 mr-4">
                    <i class="fas fa-coins text-xl"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Has Altın / Gr</p>
                    <p class="text-xl font-mono font-bold text-slate-900">₺2.515,40</p>
                </div>
            </div>
        </div>

        <!-- Özet Kartları -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute -right-4 -top-4 text-slate-50 text-7xl group-hover:text-yellow-50 transition-colors"><i class="fas fa-gem"></i></div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest relative">Toplam Stok (Has)</p>
                <h4 class="text-3xl font-black text-slate-900 mt-2 relative">1,452.25 gr</h4>
                <p class="text-xs text-green-500 mt-2 font-bold relative"><i class="fas fa-arrow-up"></i> %2.4 Artış</p>
            </div>
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute -right-4 -top-4 text-slate-50 text-7xl group-hover:text-green-50 transition-colors"><i class="fas fa-cash-register"></i></div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest relative">Kasa Mevcudu</p>
                <h4 class="text-3xl font-black text-slate-900 mt-2 relative">₺452.000</h4>
                <p class="text-xs text-slate-400 mt-2 relative">Nakit + Kredi Kartı</p>
            </div>
            <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm relative overflow-hidden group">
                <div class="absolute -right-4 -top-4 text-slate-50 text-7xl group-hover:text-red-50 transition-colors"><i class="fas fa-user-clock"></i></div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest relative">Müşteri Alacakları</p>
                <h4 class="text-3xl font-black text-slate-900 mt-2 relative">₺128.500</h4>
                <p class="text-xs text-red-500 mt-2 font-bold relative">12 bekleyen taksit</p>
            </div>
        </div>

        <!-- Stok Tablosu -->
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold text-lg text-slate-800">Son Envanter Kayıtları</h3>
                <button class="gold-gradient text-white px-6 py-3 rounded-2xl text-sm font-bold shadow-lg shadow-yellow-600/30 hover:scale-105 transition flex items-center">
                    <i class="fas fa-plus mr-2"></i> Yeni Ürün Ekle
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-[11px] text-slate-400 font-bold uppercase tracking-wider">
                        <tr>
                            <th class="p-6">Ürün Detayı</th>
                            <th class="p-6">Ayar</th>
                            <th class="p-6">Brüt Gram</th>
                            <th class="p-6">Has Gram</th>
                            <th class="p-6">İşlem</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr class="hover:bg-slate-50 transition-colors cursor-pointer group">
                            <td class="p-6 font-bold text-slate-800">14K Baget Yüzük (Luna Özel)</td>
                            <td class="p-6"><span class="bg-yellow-100 text-yellow-700 px-3 py-1 rounded-lg text-xs font-bold">14 Ayar</span></td>
                            <td class="p-6 font-mono">4.25 gr</td>
                            <td class="p-6 font-mono font-bold text-yellow-600">2.486 gr</td>
                            <td class="p-6"><i class="fas fa-edit text-slate-300 group-hover:text-yellow-600"></i></td>
                        </tr>
                        <tr class="hover:bg-slate-50 transition-colors cursor-pointer group">
                            <td class="p-6 font-bold text-slate-800">22K Klasik Bilezik</td>
                            <td class="p-6"><span class="bg-orange-100 text-orange-700 px-3 py-1 rounded-lg text-xs font-bold">22 Ayar</span></td>
                            <td class="p-6 font-mono">20.00 gr</td>
                            <td class="p-6 font-mono font-bold text-yellow-600">18.320 gr</td>
                            <td class="p-6"><i class="fas fa-edit text-slate-300 group-hover:text-yellow-600"></i></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
